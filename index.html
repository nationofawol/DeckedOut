<!DOCTYPE html>
<html>
<head>
  <title>Decker's Anime Watchlist</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Josefin Sans', sans-serif;
      background: #FFD966;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .page-container {
      width: 100%;
      max-width: 600px;
    }

    h2 {
      text-align: center;
      color: #0B5227;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #FFFFFF;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0B5227;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #357ac9;
    }
    
.entry.watching-and-waiting-for-new-season {
  border-left-color: #1e90ff; /* blue */
  background: #e8f3ff;
}

.entry.watching-but-not-caught-up {
  border-left-color: #ffb300; /* amber */
  background: #fff4d6;
}

.entry.plan-to-watch {
  border-left-color: #8e44ad; /* purple */
  background: #f4e9fb;
}

.entry.completed {
  border-left-color: #2ecc71; /* green */
  background: #e9f9ef;
}

.entry.dropped {
  border-left-color: #e74c3c; /* red */
  background: #fdecea;
}

    .entry {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin: 15px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 6px solid #0B5227;
    }

    .sort-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .sort-buttons button {
      flex: 1;
      background: #0B5227;
      color: white;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .sort-buttons button:hover {
      background: #357ac9;
    }

    .entry textarea {
      background: #fffdf5;
      border: 1px solid #e6dca8;
    }
  </style>
</head>

<body>
<div class="page-container">

  <h2>Add a Show</h2>

  <label>Show Title</label>
  <input type="text" id="title" placeholder="Enter show title">

  <label>Rating</label>
  <select id="rating">
    <option value="">Select rating</option>
    <option>Decker Pick!</option>
    <option>⭐ 1</option>
    <option>⭐⭐ 2</option>
    <option>⭐⭐⭐ 3</option>
    <option>⭐⭐⭐⭐ 4</option>
    <option>⭐⭐⭐⭐⭐ 5</option>
  </select>

  <label>Status</label>
  <select id="status">
    <option value="">Select status</option>
    <option>Watching and Waiting for New Season</option>
    <option>Completed</option>
    <option>Watching but Not Caught Up</option>
    <option>Dropped</option>
    <option>Plan to Watch</option>
  </select>

  <label>Notes (optional)</label>
  <textarea id="notes" placeholder="Add notes..."></textarea>

  <button onclick="saveShow()">Save Show</button>

  <h2>Your Shows</h2>

  <div class="sort-buttons">
    <button onclick="setSort('title')">Sort by Title</button>
    <button onclick="setSort('rating')">Sort by Rating</button>
    <button onclick="setSort('status')">Sort by Status</button>
  </div>

  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search by title..." 
    oninput="loadShows()"
    style="margin-bottom: 15px;"
  >

  <div id="showList"></div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDnc816qshKUapfDk3HCv5NK9jGxNNDm_A",
    authDomain: "deckedout-4cd13.firebaseapp.com",
    projectId: "deckedout-4cd13",
    storageBucket: "deckedout-4cd13.firebasestorage.app",
    messagingSenderId: "620649552709",
    appId: "1:620649552709:web:76173a26c794cf8751bc2c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentSort = "title";

  window.setSort = function(type) {
    currentSort = type;
    loadShows();
  };

  window.saveShow = async function () {
    const title = document.getElementById("title").value;
    const rating = document.getElementById("rating").value;
    const status = document.getElementById("status").value;
    const notes = document.getElementById("notes").value;

    if (!title || !rating || !status) {
      alert("Please fill out all fields");
      return;
    }

    await addDoc(collection(db, "shows"), { title, rating, status, notes });
    loadShows();
  };

  window.updateShow = async function (id, field, value) {
    await updateDoc(doc(db, "shows", id), { [field]: value });
    loadShows();
  };

  window.deleteShow = async function(id) {
    if (!confirm("Are you sure you want to delete this show?")) return;
    await deleteDoc(doc(db, "shows", id));
    loadShows();
  };

  async function loadShows() {
    const list = document.getElementById("showList");
    const searchValue = document.getElementById("searchInput").value.toLowerCase();
    list.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "shows"));
    let shows = [];

    querySnapshot.forEach((docSnap) => {
      shows.push({ id: docSnap.id, ...docSnap.data() });
    });

    // SEARCH
    shows = shows.filter(show =>
      show.title.toLowerCase().includes(searchValue)
    );

    // SORTING
    if (currentSort === "title") {
      shows.sort((a, b) => a.title.localeCompare(b.title));
    }

    if (currentSort === "rating") {
      const getNum = (r) => parseInt(r.replace(/[^0-9]/g, ""));
      shows.sort((a, b) => getNum(b.rating) - getNum(a.rating));
    }

    if (currentSort === "status") {
      const order = [
        "Watching and Waiting for New Season",
        "Watching but Not Caught Up",
        "Plan to Watch",
        "Completed",
        "Dropped"
      ];
      shows.sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));
    }

    // RENDER
    shows.forEach((show) => {
      const div = document.createElement("div");
      div.className = "entry " + show.status.replaceAll(" ", "-").toLowerCase();


      div.innerHTML = `
        <strong>${show.title}</strong><br><br>

        Rating:
        <select onchange="updateShow('${show.id}', 'rating', this.value)">
          <option>Select rating</option>
          <option ${show.rating === "Decker Pick!" ? "selected" : ""}>Decker Pick!</option>
          <option ${show.rating === "⭐ 1" ? "selected" : ""}>⭐ 1</option>
          <option ${show.rating === "⭐⭐ 2" ? "selected" : ""}>⭐⭐ 2</option>
          <option ${show.rating === "⭐⭐⭐ 3" ? "selected" : ""}>⭐⭐⭐ 3</option>
          <option ${show.rating === "⭐⭐⭐⭐ 4" ? "selected" : ""}>⭐⭐⭐⭐ 4</option>
          <option ${show.rating === "⭐⭐⭐⭐⭐ 5" ? "selected" : ""}>⭐⭐⭐⭐⭐ 5</option>
        </select>

        <br><br>

        Status:
        <select onchange="updateShow('${show.id}', 'status', this.value)">
          <option ${show.status === "Watching and Waiting for New Season" ? "selected" : ""}>Watching and Waiting for New Season</option>
          <option ${show.status === "Completed" ? "selected" : ""}>Completed</option>
          <option ${show.status === "Watching but Not Caught Up" ? "selected" : ""}>Watching but Not Caught Up</option>
          <option ${show.status === "Dropped" ? "selected" : ""}>Dropped</option>
          <option ${show.status === "Plan to Watch" ? "selected" : ""}>Plan to Watch</option>
        </select>

        <br><br>

        <label><strong>Notes:</strong></label><br>
        <textarea 
          onchange="updateShow('${show.id}', 'notes', this.value)"
          style="width:100%; height:80px; padding:10px; border-radius:6px; border:1px solid #ccc; font-size:14px;"
        >${show.notes || ""}</textarea>

        <br><br>

        <button onclick="deleteShow('${show.id}')" style="
          background:#b30000;
          color:white;
          padding:8px 12px;
          border:none;
          border-radius:6px;
          cursor:pointer;
        ">
          Delete
        </button>
      `;

      list.appendChild(div);
    });
  }

  window.onload = loadShows;
  window.loadShows = loadShows;

</script>

</body>
</html>
