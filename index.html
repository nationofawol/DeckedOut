<!DOCTYPE html>
<html>
<head>
<!-- Place this in the <head> of your HTML -->

  <title>Decker's Anime Watchlist</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
  body {
    font-family: 'Josefin Sans', sans-serif;
    background: #FFD966;
    display: flex;
    justify-content: center;
    padding: 40px;
  }

  .page-container {
    width: 100%;
    max-width: 600px;
  }

  h2 {
    text-align: center;
    color: #0B5227;
    margin-bottom: 20px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #FFFFFF;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #0B5227;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  button:hover {
    background: #357ac9;
  }

  .entry {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin: 15px 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border-left: 6px solid #0B5227;
  }

  .entry strong {
    font-size: 18px;
    color: #0B5227;
  }

  .sort-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.sort-buttons button {
  flex: 1;
  background: #0B5227;
  color: white;
  padding: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.sort-buttons button:hover {
  background: #357ac9;
}
.sort-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.sort-buttons button {
  flex: 1;
  background: #0B5227;
  color: white;
  padding: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.sort-buttons button:hover {
  background: #357ac9;
}


</style>
</head>

<body>
  <div class="page-container">


  <h2>Add a Show</h2>

  <label>Show Title</label><br>
  <input type="text" id="title" placeholder="Enter show title"><br><br>

  <label>Rating</label><br>
  <select id="rating">
    <option value="">Select rating</option>
    <option>Decker Rate this Show</option>
    <option>⭐ 1</option>
    <option>⭐⭐ 2</option>
    <option>⭐⭐⭐ 3</option>
    <option>⭐⭐⭐⭐ 4</option>
    <option>⭐⭐⭐⭐⭐ 5</option>
  </select><br><br>

  <label>Status</label><br>
  <select id="status">
    <option value="">Select status</option>
    <option>Watching and Waiting for New Season</option>
    <option>Completed</option>
    <option>Watching but Not Caught Up</option>
    <option>Dropped</option>
    <option>Plan to Watch</option>
  </select><br><br>

  <button onclick="saveShow()">Save Show</button>

  <h2>Your Shows</h2>

  <div class="sort-buttons">
  <button onclick="setSort('title')">Sort by Title</button>
  <button onclick="setSort('rating')">Sort by Rating</button>
  <button onclick="setSort('status')">Sort by Status</button>
</div>

<input 
  type="text" 
  id="searchInput" 
  placeholder="Search by title..." 
  oninput="loadShows()" 
  style="margin-bottom: 15px;"
>

  <div id="showList"></div>


<!-- ⭐ FIREBASE + FIRESTORE -->
<script type="module">
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, getDocs, updateDoc, doc 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⭐ Your Firebase config
  let currentSort = "title";

window.setSort = function (type) {
  currentSort = type;
  loadShows();
};

  const firebaseConfig = {
    apiKey: "AIzaSyDnc816qshKUapfDk3HCv5NK9jGxNNDm_A",
    authDomain: "deckedout-4cd13.firebaseapp.com",
    projectId: "deckedout-4cd13",
    storageBucket: "deckedout-4cd13.firebasestorage.app",
    messagingSenderId: "620649552709",
    appId: "1:620649552709:web:76173a26c794cf8751bc2c"
  };

  // ⭐ Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);


  // ⭐ Save a new show
  window.saveShow = async function () {
    const title = document.getElementById("title").value;
    const rating = document.getElementById("rating").value;
    const status = document.getElementById("status").value;

    if (!title || !rating || !status) {
      alert("Please fill out all fields");
      return;
    }

    await addDoc(collection(db, "shows"), { title, rating, status });
    loadShows();
  };


  // ⭐ Update an existing show
  window.updateShow = async function (id, field, value) {
    const ref = doc(db, "shows", id);
    await updateDoc(ref, { [field]: value });
    loadShows();
  };


  // ⭐ Load all shows
   const statusEmojis = {
   "Watching and Waiting for New Season": "👀",
   "Completed": "✅",
    "Watching but Not Caught Up": "⏸️",
    "Dropped": "❌",
    "Plan to Watch": "📅"
  };

 async function loadShows() {
  const list = document.getElementById("showList");
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "shows"));
  let shows = [];

  querySnapshot.forEach((docSnap) => {
    shows.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  // ⭐ Sorting logic
  if (currentSort === "title") {
    shows.sort((a, b) => a.title.localeCompare(b.title));
  }

  if (currentSort === "rating") {
    // Extract the number from "⭐⭐⭐ 3"
    const getNum = (r) => parseInt(r.replace(/[^0-9]/g, ""));
    shows.sort((a, b) => getNum(b.rating) - getNum(a.rating));
  }

  if (currentSort === "status") {
    const order = ["Watching and Waiting for New Season", "Watching but Not Caught Up", "Plan to Watch", "Completed", "Dropped"];
    shows.sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));
  }

  // ⭐ Render sorted list
  shows.forEach((show) => {
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <strong>${show.title}</strong><br>

      Rating:
      <select onchange="updateShow('${show.id}', 'rating', this.value)">
        <option ${show.rating === "Decker Rate this Show" ? "selected" : ""}>Select rating</option>
        <option ${show.rating === "⭐ 1" ? "selected" : ""}>⭐ 1</option>
        <option ${show.rating === "⭐⭐ 2" ? "selected" : ""}>⭐⭐ 2</option>
        <option ${show.rating === "⭐⭐⭐ 3" ? "selected" : ""}>⭐⭐⭐ 3</option>
        <option ${show.rating === "⭐⭐⭐⭐ 4" ? "selected" : ""}>⭐⭐⭐⭐ 4</option>
        <option ${show.rating === "⭐⭐⭐⭐⭐ 5" ? "selected" : ""}>⭐⭐⭐⭐⭐ 5</option>
      </select>
      <br>

      Status:
      <select onchange="updateShow('${show.id}', 'status', this.value)">
        <option ${show.status === "Watching and Waiting for New Season" ? "selected" : ""}>Watching and Waiting for New Season</option>
        <option ${show.status === "Completed" ? "selected" : ""}>Completed</option>
        <option ${show.status === "Watching but Not Caught Up" ? "selected" : ""}>Watching but Not Caught Up</option>
        <option ${show.status === "Dropped" ? "selected" : ""}>Dropped</option>
        <option ${show.status === "Plan to Watch" ? "selected" : ""}>Plan to Watch</option>
      </select>
    `;

    list.appendChild(div);
  });
}


  window.onload = loadShows;
</script>
</div>
</body>
</html>
