<!DOCTYPE html>
<html>
<head>
<!-- Place this in the <head> of your HTML -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com" rel="stylesheet">
  <title>Decker's Anime Watchlist</title>

  <style>
  body {
    font-family: 'Josefin Sans', sans-serif;
    background: #FFD966;
    display: flex;
    justify-content: center;
    padding: 40px;
  }

  .page-container {
    width: 100%;
    max-width: 600px;
  }

  h2 {
    text-align: center;
    color: #0B5227;
    margin-bottom: 20px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #FFFFFF;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #0B5227;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  button:hover {
    background: #357ac9;
  }

  .entry {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin: 15px 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border-left: 6px solid #0B5227;
  }

  .entry strong {
    font-size: 18px;
    color: #0B5227;
  }
</style>
</head>

<body>
  <div class="page-container">


  <h2>Add a Show</h2>

  <label>Show Title</label><br>
  <input type="text" id="title" placeholder="Enter show title"><br><br>

  <label>Rating</label><br>
  <select id="rating">
    <option value="">Select rating</option>
    <option>⭐ 1</option>
    <option>⭐⭐ 2</option>
    <option>⭐⭐⭐ 3</option>
    <option>⭐⭐⭐⭐ 4</option>
    <option>⭐⭐⭐⭐⭐ 5</option>
  </select><br><br>

  <label>Status</label><br>
  <select id="status">
    <option value="">Select status</option>
    <option>Watching</option>
    <option>Completed</option>
    <option>On Hold</option>
    <option>Dropped</option>
    <option>Plan to Watch</option>
  </select><br><br>

  <button onclick="saveShow()">Save Show</button>

  <h2>Your Shows</h2>
  <div id="showList"></div>


<!-- ⭐ FIREBASE + FIRESTORE -->
<script type="module">
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, getDocs, updateDoc, doc 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⭐ Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDnc816qshKUapfDk3HCv5NK9jGxNNDm_A",
    authDomain: "deckedout-4cd13.firebaseapp.com",
    projectId: "deckedout-4cd13",
    storageBucket: "deckedout-4cd13.firebasestorage.app",
    messagingSenderId: "620649552709",
    appId: "1:620649552709:web:76173a26c794cf8751bc2c"
  };

  // ⭐ Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);


  // ⭐ Save a new show
  window.saveShow = async function () {
    const title = document.getElementById("title").value;
    const rating = document.getElementById("rating").value;
    const status = document.getElementById("status").value;

    if (!title || !rating || !status) {
      alert("Please fill out all fields");
      return;
    }

    await addDoc(collection(db, "shows"), { title, rating, status });
    loadShows();
  };


  // ⭐ Update an existing show
  window.updateShow = async function (id, field, value) {
    const ref = doc(db, "shows", id);
    await updateDoc(ref, { [field]: value });
    loadShows();
  };


  // ⭐ Load all shows
   const statusEmojis = {
   "Watching": "👀",
   "Completed": "✅",
    "On Hold": "⏸️",
    "Dropped": "❌",
    "Plan to Watch": "📅"
  };

  async function loadShows() {
    const list = document.getElementById("showList");
    list.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "shows"));
    querySnapshot.forEach((docSnap) => {
      const show = docSnap.data();
      const id = docSnap.id;

      const div = document.createElement("div");
      div.className = "entry";

      div.innerHTML = `
        <strong>${show.title}</strong><br>

        Rating:
        <select onchange="updateShow('${id}', 'rating', this.value)">
          <option ${show.rating === "⭐ 1" ? "selected" : ""}>⭐ 1</option>
          <option ${show.rating === "⭐⭐ 2" ? "selected" : ""}>⭐⭐ 2</option>
          <option ${show.rating === "⭐⭐⭐ 3" ? "selected" : ""}>⭐⭐⭐ 3</option>
          <option ${show.rating === "⭐⭐⭐⭐ 4" ? "selected" : ""}>⭐⭐⭐⭐ 4</option>
          <option ${show.rating === "⭐⭐⭐⭐⭐ 5" ? "selected" : ""}>⭐⭐⭐⭐⭐ 5</option>
        </select>
        <br>

        Status:
        <select onchange="updateShow('${id}', 'status', this.value)">
          <option ${show.status === "Watching" ? "selected" : ""}>Watching</option>
          <option ${show.status === "Completed" ? "selected" : ""}>Completed</option>
          <option ${show.status === "On Hold" ? "selected" : ""}>On Hold</option>
          <option ${show.status === "Dropped" ? "selected" : ""}>Dropped</option>
          <option ${show.status === "Plan to Watch" ? "selected" : ""}>Plan to Watch</option>
        </select>
        <br>
        Status: ${statusEmojis[show.status]} ${show.status}
      `;

      list.appendChild(div);
    });
  }

  window.onload = loadShows;
</script>
</div>
</body>
</html>
